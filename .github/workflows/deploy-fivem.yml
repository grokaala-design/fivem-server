name: Deploy FiveM Server
on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4

      - name: Download resources from release
        run: |
          RELEASE_JSON=$(curl -s "https://api.github.com/repos/${{ github.repository }}/releases/latest")
          DL_URL=$(echo "$RELEASE_JSON" | grep -o '"browser_download_url": *"[^"]*"' | head -1 | sed 's/.*"browser_download_url": *"//;s/"//')
          echo "Downloading from: $DL_URL"
          curl -L -o resources.zip "$DL_URL"

      - name: Download FXServer
        run: |
          echo "Fetching latest FXServer build..."
          BUILD_PAGE=$(curl -s "https://runtime.fivem.net/artifacts/fivem/build_proot_linux/master/")
          BUILD_ID=$(echo "$BUILD_PAGE" | grep -oP '/(\d+-[a-f0-9]+)/fx\.tar\.xz' | head -1 | grep -oP '\d+-[a-f0-9]+')
          if [ -z "$BUILD_ID" ]; then
            echo "Failed to find build ID, trying fallback..."
            BUILD_ID="25770-a2e23b"
          fi
          echo "Using build: $BUILD_ID"
          curl -L -o fx.tar.xz "https://runtime.fivem.net/artifacts/fivem/build_proot_linux/master/${BUILD_ID}/fx.tar.xz"
          mkdir -p fxserver
          tar -xf fx.tar.xz -C fxserver
          rm fx.tar.xz
          echo "FXServer extracted successfully"

      - name: Set up resources
        run: |
          mkdir -p server-data/resources
          unzip -qo resources.zip -d server-data/resources/

      - name: Write server.cfg
        run: |
          cat > server-data/server.cfg << 'CFG'
          endpoint_add_tcp "0.0.0.0:30120"
          endpoint_add_udp "0.0.0.0:30120"
          sv_maxclients 32
          sv_hostname "~g~FiveM Server"
          sv_licenseKey "${{ secrets.SV_LICENSE_KEY }}"
          sv_master1 ""
          ensure chat
          ensure mapmanager
          ensure spawnmanager
          ensure sessionmanager
          ensure basic-gamemode
          ensure hardcap
          ensure baseevents
          ensure wave-anticheat
          ensure Godzilla
          CFG

      - name: Install playit.gg
        run: |
          curl -fsSL https://packages.playit.gg/install.sh | bash

      - name: Start server + tunnel
        run: |
          cd fxserver
          nohup bash run.sh +exec ../server-data/server.cfg > ../fivem.log 2>&1 &
          sleep 15
          nohup playit > ../playit.log 2>&1 &
          sleep 5
          echo "=== Server started ==="
          echo "Server PID: $(pgrep -f FXServer || echo 'not found')"
          echo "playit PID: $(pgrep playit || echo 'not found')"

      - name: Wait for tunnel
        run: |
          sleep 30
          cat playit.log | grep -i "tunnel\|address\|listen" || true
          echo "=== Tunnel info above ==="

      - name: Keep alive
        run: |
          for i in $(seq 1 720); do
            if ! pgrep -f FXServer > /dev/null 2>&1; then
              echo "FXServer died at ${i}x10s - restarting"
              cd fxserver
              nohup bash run.sh +exec ../server-data/server.cfg > ../fivem.log 2>&1 &
              cd ..
            fi
            sleep 10
          done
