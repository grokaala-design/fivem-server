name: Deploy FiveM Server
on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4

      - name: Download resources from release
        run: |
          curl -L -o resources.zip "https://github.com/${{ github.repository }}/releases/download/v2/resources.zip"

      - name: Download FXServer
        run: |
          FX_URL="https://runtime.fivem.net/artifacts/fivem/build_proot_linux/master/25770-8ddccd4e4dfd6a760ce18651656463f961cc4761/fx.tar.xz"
          curl -L -o fx.tar.xz "$FX_URL"
          mkdir -p fxserver
          tar -xf fx.tar.xz -C fxserver
          rm fx.tar.xz

      - name: Set up resources
        run: |
          mkdir -p server-data/resources
          unzip -qo resources.zip -d server-data/resources/

      - name: Write server.cfg
        run: |
          cat > server-data/server.cfg << 'CFG'
          endpoint_add_tcp "0.0.0.0:30120"
          endpoint_add_udp "0.0.0.0:30120"
          sv_maxclients 32
          sv_hostname "~g~FiveM Server"
          sv_licenseKey "${{ secrets.SV_LICENSE_KEY }}"
          sv_master1 ""
          ensure chat
          ensure mapmanager
          ensure spawnmanager
          ensure sessionmanager
          ensure basic-gamemode
          ensure hardcap
          ensure baseevents
          ensure wave-anticheat
          ensure Godzilla
          CFG

      - name: Install playit.gg
        run: |
          curl -fsSL https://packages.playit.gg/install.sh | bash -s -- -y

      - name: Start FiveM server
        run: |
          cd fxserver
          nohup bash run.sh +exec ../server-data/server.cfg > ../fivem.log 2>&1 &
          sleep 10
          echo "FXServer PID: $(pgrep -f FXServer || echo 'not found')"

      - name: Start playit and capture claim URL
        run: |
          nohup playit > playit.log 2>&1 &
          PLAYIT_PID=$!
          echo "playit PID: $PLAYIT_PID"
          echo ""
          echo "========================================="
          echo "  WAITING FOR PLAYIT TO INITIALIZE..."
          echo "========================================="
          sleep 15
          echo ""
          echo "=== FULL PLAYIT OUTPUT ==="
          cat playit.log
          echo "=== END PLAYIT OUTPUT ==="
          echo ""
          echo "Looking for claim URL in output..."
          grep -i "claim" playit.log || echo "No claim URL found yet"
          grep -i "secret" playit.log || echo "No secret found"
          grep -i "tunnel" playit.log || echo "No tunnel info found"
          grep -i "address" playit.log || echo "No address found"
          grep -i "listen" playit.log || echo "No listen info found"
          echo ""
          echo "========================================="
          echo "  OPEN YOUR PLAYIT DASHBOARD:"
          echo "  https://playit.gg/account/agents"
          echo "========================================="

      - name: Keep alive
        run: |
          for i in $(seq 1 720); do
            if ! pgrep -f FXServer > /dev/null 2>&1; then
              echo "FXServer died at ${i}x10s - restarting"
              cd fxserver
              nohup bash run.sh +exec ../server-data/server.cfg > ../fivem.log 2>&1 &
              cd ..
            fi
            sleep 10
          done
