name: Deploy FiveM Server
on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4

      - name: Download resources from release
        run: |
          curl -L -o resources.zip "https://github.com/${{ github.repository }}/releases/download/v2/resources.zip"

      - name: Download FXServer
        run: |
          FX_URL="https://runtime.fivem.net/artifacts/fivem/build_proot_linux/master/25770-8ddccd4e4dfd6a760ce18651656463f961cc4761/fx.tar.xz"
          curl -L -o fx.tar.xz "$FX_URL"
          mkdir -p fxserver
          tar -xf fx.tar.xz -C fxserver
          rm fx.tar.xz

      - name: Set up resources
        run: |
          mkdir -p server-data/resources
          unzip -qo resources.zip -d server-data/resources/

      - name: Write server.cfg
        run: |
          cat > server-data/server.cfg << 'CFG'
          endpoint_add_tcp "0.0.0.0:30120"
          endpoint_add_udp "0.0.0.0:30120"
          sv_maxclients 32
          sv_hostname "~g~FiveM Server"
          sv_licenseKey "${{ secrets.SV_LICENSE_KEY }}"
          sv_master1 ""
          ensure chat
          ensure mapmanager
          ensure spawnmanager
          ensure sessionmanager
          ensure basic-gamemode
          ensure hardcap
          ensure baseevents
          ensure wave-anticheat
          ensure Godzilla
          CFG

      - name: Install playit + cloudflared
        run: |
          curl -fsSL https://packages.playit.gg/install.sh | bash -s -- -y || true
          curl -L -o /usr/local/bin/cloudflared "https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64" || true
          chmod +x /usr/local/bin/cloudflared || true

      - name: Start FiveM server
        run: |
          cd fxserver
          nohup bash run.sh +exec ../server-data/server.cfg > ../fivem.log 2>&1 &
          sleep 10
          echo "FXServer PID: $(pgrep -f FXServer || echo 'not found')"

      - name: Start tunnel (cloudflared)
        run: |
          cloudflared tunnel --url http://localhost:30120 > cloudflared.log 2>&1 &
          CF_PID=$!
          echo "cloudflared PID: $CF_PID"
          sleep 15
          echo "=== CLOUDFLARED OUTPUT ==="
          cat cloudflared.log
          echo "=== END ==="
          TUNNEL_URL=$(grep -oP 'https://[a-z0-9-]+\.trycloudflare\.com' cloudflared.log | head -1)
          if [ -n "$TUNNEL_URL" ]; then
            echo "TUNNEL_URL=$TUNNEL_URL" >> $GITHUB_ENV
            echo ""
            echo "============================================"
            echo "  YOUR SERVER ADDRESS: $TUNNEL_URL"
            echo "  Connect in FiveM: connect $TUNNEL_URL"
            echo "============================================"
          else
            echo "No tunnel URL found, check cloudflared.log"
          fi

      - name: Keep alive
        run: |
          for i in $(seq 1 720); do
            if ! pgrep -f FXServer > /dev/null 2>&1; then
              echo "FXServer died - restarting"
              cd fxserver
              nohup bash run.sh +exec ../server-data/server.cfg > ../fivem.log 2>&1 &
              cd ..
            fi
            if ! pgrep -f cloudflared > /dev/null 2>&1; then
              echo "cloudflared died - restarting"
              cloudflared tunnel --url http://localhost:30120 >> cloudflared.log 2>&1 &
            fi
            sleep 10
          done
